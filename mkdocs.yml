site_name: 한성대학교 교육혁신센터 · AI융합교육과정 분석
site_url: https://parclab-hsu.github.io/ai-curriculum-2026/
site_description: 2026학년도 AI융합교육과정 개편 — 트랙·학과별 기술 트렌드 및 직무 역량 분석 (LinkedIn·사람인·잡코리아 기반)
site_author: PARC Lab · 한성대학교 교육혁신센터
docs_dir: docs
repo_url: https://github.com/parclab-hsu/ai-curriculum-2026
repo_name: parclab-hsu/ai-curriculum-2026
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: teal
      accent: teal
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 홈: index.md
  - 분석 개요: overview.md
  - 고용노동부 취업동향·10년 전망: employment-outlook.md
  - 글로벌 비교 (미국·중국): global-employment-outlook.md
  - 공통 채용 데이터 출처: data-sources.md
  - 용어집 (Glossary): glossary.md
  - 자주 묻는 질문 (FAQ): faq.md
  - 디자인대학 (2027~ AI디자인대학):
      - 글로벌패션산업학부 · 패션마케팅트랙: design/fashion-marketing.md
      - 글로벌패션산업학부 · 패션디자인트랙: design/fashion-design.md
      - 글로벌패션산업학부 · 패션크리에이티브디렉션트랙: design/fashion-creative-direction.md
      - ICT디자인학부 · 미디어디자인트랙: design/media-design.md
      - ICT디자인학부 · 시각디자인트랙: design/visual-design.md
      - ICT디자인학부 · 영상애니메이션디자인트랙: design/motion-animation.md
      - ICT디자인학부 · 게임그래픽디자인트랙: design/game-graphic.md
      - ICT디자인학부 · 인테리어디자인트랙: design/interior-design.md
      - ICT디자인학부 · VMD전시디자인트랙: design/vmd-exhibition.md
      - ICT디자인학부 · UX/UI디자인트랙: design/uxui-design.md
      - 뷰티디자인매니지먼트학과 (2027~ AI뷰티디자인학과): design/beauty-design.md
  - IT공과대학:
      - 컴퓨터공학부 · 모바일소프트웨어트랙: it/mobile-software.md
      - 컴퓨터공학부 · 빅데이터트랙: it/big-data.md
      - 컴퓨터공학부 · 디지털콘텐츠·가상현실트랙: it/immersive-media.md
      - 컴퓨터공학부 · 웹공학트랙: it/web-engineering.md
      - 기계전자공학부 (2027~ 전기전자공학부) · 전자트랙: it/electronics.md
      - 기계전자공학부 (2027~ 전기전자공학부) · 시스템반도체트랙: it/system-semiconductor.md
      - 산업시스템공학부 · 산업공학트랙: it/industrial-engineering.md
      - 산업시스템공학부 · 응용산업데이터공학트랙: it/applied-industrial-data.md
  - 창의융합대학 (2027~ AI융합대학):
      - AI응용학과: ai/ai-application.md
      - 융합보안학과: ai/convergence-security.md
      - 미래모빌리티학과: ai/future-mobility.md
      - 문학문화콘텐츠학과: ai/literature-culture-contents.md
      - AI기계로봇공학과 (2027 신설 예정): ai/ai-robotics.md
